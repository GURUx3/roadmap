<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>DSA · Placement Prep</title>
  <style>
    :root{
      --bg:#f7f6f3;--surface:#fff;--border:#e8e6e1;--ink:#1a1916;
      --easy:#2d6a4f;--medium:#b45309;--hard:#9f1239;--radius:6px;
    }
    *{box-sizing:border-box;margin:0;padding:0;font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;font-size:13px}
    body{background:var(--bg);color:var(--ink);padding:24px;max-width:780px}
    h1{font-size:18px;margin-bottom:4px}
    .sub{color:#888;font-size:11px;margin-bottom:10px}
    .pbar-wrap{height:3px;background:#e8e6e1;border-radius:2px;margin-bottom:6px}
    .pbar{height:3px;background:var(--easy);border-radius:2px;transition:width .3s;width:0}
    .ptxt{font-size:11px;color:#888;margin-bottom:18px}
    .phase{margin-bottom:10px;border:1px solid var(--border);border-radius:var(--radius);background:var(--surface)}
    .ph-head{padding:10px 12px;font-weight:600;cursor:pointer;display:flex;justify-content:space-between;align-items:center;user-select:none}
    .ph-head:hover{background:#faf9f6}
    .ph-meta{font-weight:400;color:#aaa;font-size:11px;display:flex;gap:10px;align-items:center}
    .ph-done{color:var(--easy);font-size:10px}
    .ph-body{display:none;padding:4px 12px 10px}
    .phase.open .ph-body{display:block}
    .problem{display:flex;gap:6px;padding:3.5px 0;align-items:center}
    .problem.done a{text-decoration:line-through;opacity:.4}
    .problem.done .tag,.problem.done .src{opacity:.4}
    .num{color:#ccc;width:24px;flex-shrink:0;text-align:right;font-size:11px}
    .tag{font-size:10px;padding:1px 5px;border-radius:3px;color:#fff;flex-shrink:0}
    .tag.Easy{background:var(--easy)}.tag.Medium{background:var(--medium)}.tag.Hard{background:var(--hard)}
    .src{font-size:10px;font-weight:700;flex-shrink:0}
    .src.lc{color:#f59e0b}.src.gfg{color:#16a34a}
    a{color:var(--ink);text-decoration:none}
    a:hover{text-decoration:underline}
    input[type=checkbox]{cursor:pointer;accent-color:var(--easy);flex-shrink:0;width:13px;height:13px}
  </style>
</head>

const TOTAL = PLAN.reduce((s,ph)=>s+ph.p.length,0);
const KEY = 'dsa_done_v2';
const DONE = new Set(JSON.parse(localStorage.getItem(KEY)||'[]'));

function uid(slug,src){return slug+'|'+src;}

function updateProgress(){
  const done=DONE.size;
  document.getElementById('pbar').style.width=(done/TOTAL*100)+'%';
  document.getElementById('ptxt').textContent=done+' / '+TOTAL+' solved';
  PLAN.forEach((ph,i)=>{
    const phDone=ph.p.filter(p=>DONE.has(uid(p[1],p[3]))).length;
    const el=document.getElementById('pp'+i);
    if(el) el.textContent=phDone+'/'+ph.p.length;
  });
}

function toggle(id){
  const el=document.getElementById('pr-'+id);
  if(!el)return;
  if(DONE.has(id)){DONE.delete(id);el.classList.remove('done');}
  else{DONE.add(id);el.classList.add('done');}
  localStorage.setItem(KEY,JSON.stringify([...DONE]));
  updateProgress();
}

let n=0;
function row([name,slug,diff,src]){
  n++;
  const id=uid(slug,src);
  const done=DONE.has(id);
  const url=src==='lc'
    ?`https://leetcode.com/problems/${slug}/`
    :`https://www.geeksforgeeks.org/problems/${slug}/1`;
  return `<div class="problem${done?' done':''}" id="pr-${id}">
    <input type="checkbox"${done?' checked':''} onchange="toggle('${id}')">
    <span class="num">${n}</span>
    <a href="${url}" target="_blank">${name}</a>
    <span class="tag ${diff}">${diff}</span>
    <span class="src ${src}">${src==='lc'?'LC':'GFG'}</span>
  </div>`;
}

function phase(w,i){
  const phDone=w.p.filter(p=>DONE.has(uid(p[1],p[3]))).length;
  return `<div class="phase">
    <div class="ph-head" onclick="this.parentElement.classList.toggle('open')">
      <span>Phase ${w.ph} · ${w.t}</span>
      <span class="ph-meta">
        <span class="ph-done" id="pp${i}">${phDone}/${w.p.length}</span>
        <span>${w.p.length} problems</span>
      </span>
    </div>
    <div class="ph-body">${w.p.map(row).join('')}</div>
  </div>`;
}

document.getElementById('app').innerHTML=PLAN.map(phase).join('');
updateProgress();
</script>
</body>
</html>
