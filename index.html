<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DSA 90-Day Blueprint</title>
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&family=DM+Mono:wght@400;500&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;1,9..144,300&display=swap"
    rel="stylesheet" />
  <style>
    :root {
      --bg: #f7f6f3;
      --surface: #ffffff;
      --surface-alt: #f2f1ee;
      --border: #e8e6e1;
      --border-soft: #f0eee9;

      --ink: #1a1916;
      --ink-2: #3d3c38;
      --ink-3: #6b6960;
      --ink-4: #9e9c96;

      --m1: #2d6a4f;
      --m1-bg: #edf7f2;
      --m1-mid: #c8e6d9;

      --m2: #1e3a8a;
      --m2-bg: #eff4ff;
      --m2-mid: #c3d4f5;

      --m3: #92400e;
      --m3-bg: #fef7ee;
      --m3-mid: #f5d9b0;

      --easy: #2d6a4f;
      --easy-bg: #edf7f2;
      --medium: #b45309;
      --medium-bg: #fef7ee;
      --hard: #9f1239;
      --hard-bg: #fff1f3;

      --radius: 10px;
      --radius-sm: 6px;
      --sidebar-w: 252px;
    }

    *,
    *::before,
    *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      font-size: 15px;
    }

    body {
      background: var(--bg);
      color: var(--ink);
      font-family: 'DM Sans', sans-serif;
      line-height: 1.5;
      min-height: 100vh;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* ── HEADER ── */
    .header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 32px;
      height: 60px;
      display: flex;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 200;
    }

    .header-inner {
      width: 100%;
      max-width: 1400px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      gap: 0;
    }

    .logo {
      display: flex;
      align-items: baseline;
      gap: 10px;
      flex: 1;
    }

    .logo-mark {
      font-family: 'Fraunces', serif;
      font-size: 18px;
      font-weight: 400;
      color: var(--ink);
      letter-spacing: -0.3px;
    }

    .logo-sub {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--ink-4);
      letter-spacing: 0.02em;
      font-weight: 400;
    }

    .header-stats {
      display: flex;
      gap: 1px;
      background: var(--border);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      overflow: hidden;
    }

    .h-stat {
      background: var(--surface);
      padding: 7px 18px;
      text-align: center;
    }

    .h-stat .n {
      font-family: 'Fraunces', serif;
      font-size: 16px;
      font-weight: 400;
      color: var(--ink);
      line-height: 1;
      display: block;
    }

    .h-stat .l {
      font-family: 'DM Mono', monospace;
      font-size: 9px;
      color: var(--ink-4);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      display: block;
      margin-top: 2px;
    }

    /* ── LAYOUT ── */
    .layout {
      max-width: 1400px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: var(--sidebar-w) 1fr;
      min-height: calc(100vh - 60px);
    }

    /* ── SIDEBAR ── */
    .sidebar {
      background: var(--surface);
      border-right: 1px solid var(--border);
      padding: 20px 0 32px;
      position: sticky;
      top: 60px;
      height: calc(100vh - 60px);
      overflow-y: auto;
    }

    .sidebar::-webkit-scrollbar {
      width: 3px;
    }

    .sidebar::-webkit-scrollbar-track {
      background: transparent;
    }

    .sidebar::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 2px;
    }

    .sidebar-group {
      margin-bottom: 4px;
    }

    .sidebar-label {
      font-family: 'DM Mono', monospace;
      font-size: 9.5px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--ink-4);
      padding: 12px 20px 6px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .sidebar-label::before {
      content: '';
      display: inline-block;
      width: 5px;
      height: 5px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .sg-m1 .sidebar-label::before {
      background: var(--m1);
    }

    .sg-m2 .sidebar-label::before {
      background: var(--m2);
    }

    .sg-m3 .sidebar-label::before {
      background: var(--m3);
    }

    .week-btn {
      display: flex;
      align-items: center;
      gap: 10px;
      width: 100%;
      background: none;
      border: none;
      color: var(--ink-3);
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 400;
      padding: 8px 20px;
      cursor: pointer;
      text-align: left;
      border-left: 2px solid transparent;
      transition: all 0.12s ease;
      line-height: 1.3;
    }

    .week-btn:hover {
      color: var(--ink);
      background: var(--surface-alt);
    }

    .week-btn.active {
      color: var(--ink);
      font-weight: 500;
      background: var(--surface-alt);
    }

    .sg-m1 .week-btn.active {
      border-left-color: var(--m1);
      color: var(--m1);
    }

    .sg-m2 .week-btn.active {
      border-left-color: var(--m2);
      color: var(--m2);
    }

    .sg-m3 .week-btn.active {
      border-left-color: var(--m3);
      color: var(--m3);
    }

    .w-num {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      color: var(--ink-4);
      min-width: 26px;
      flex-shrink: 0;
    }

    .week-btn.active .w-num {
      color: inherit;
      opacity: 0.6;
    }

    /* ── MAIN ── */
    .main {
      padding: 32px 36px 64px;
      overflow-y: auto;
    }

    /* ── WEEK HERO ── */
    .week-hero {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 32px 36px;
      margin-bottom: 24px;
    }

    .week-eyebrow {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 10px;
      opacity: 0.7;
    }

    .week-title {
      font-family: 'Fraunces', serif;
      font-size: 28px;
      font-weight: 400;
      letter-spacing: -0.5px;
      line-height: 1.2;
      color: var(--ink);
      margin-bottom: 14px;
    }

    .week-focus {
      font-size: 14px;
      color: var(--ink-3);
      line-height: 1.65;
      max-width: 640px;
      margin-bottom: 22px;
    }

    .week-chips {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 22px;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      padding: 5px 12px;
      border-radius: 100px;
      font-weight: 400;
    }

    .chip-m1 {
      background: var(--m1-bg);
      color: var(--m1);
    }

    .chip-m2 {
      background: var(--m2-bg);
      color: var(--m2);
    }

    .chip-m3 {
      background: var(--m3-bg);
      color: var(--m3);
    }

    .chip-neutral {
      background: var(--surface-alt);
      color: var(--ink-3);
    }

    .mentor-block {
      background: var(--surface-alt);
      border-left: 3px solid var(--border);
      border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
      padding: 16px 20px;
      font-size: 13.5px;
      color: var(--ink-3);
      line-height: 1.65;
    }

    .mentor-block.m1 {
      border-left-color: var(--m1);
    }

    .mentor-block.m2 {
      border-left-color: var(--m2);
    }

    .mentor-block.m3 {
      border-left-color: var(--m3);
    }

    .mentor-label {
      font-family: 'DM Mono', monospace;
      font-size: 9.5px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 6px;
      opacity: 0.55;
    }

    .mentor-block strong {
      color: var(--ink);
      font-weight: 600;
    }

    /* ── DAYS GRID ── */
    .days-grid {
      display: grid;
      gap: 10px;
    }

    .day-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      transition: border-color 0.15s;
    }

    .day-card:hover {
      border-color: #d8d5cf;
    }

    .day-header {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 20px;
      cursor: pointer;
      user-select: none;
    }

    .day-num-badge {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      color: var(--ink-4);
      background: var(--surface-alt);
      padding: 3px 8px;
      border-radius: 4px;
      flex-shrink: 0;
      letter-spacing: 0.03em;
    }

    .day-title {
      font-size: 13.5px;
      font-weight: 500;
      color: var(--ink);
      flex: 1;
    }

    .day-meta {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .p-count-badge {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      color: var(--ink-4);
    }

    .expand-btn {
      width: 22px;
      height: 22px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--ink-4);
      transition: transform 0.2s ease, color 0.15s;
      flex-shrink: 0;
    }

    .expand-btn svg {
      display: block;
    }

    .day-card.open .expand-btn {
      transform: rotate(180deg);
      color: var(--ink-3);
    }

    .day-body {
      display: none;
      padding: 0 20px 16px;
      flex-direction: column;
      gap: 6px;
    }

    .day-card.open .day-body {
      display: flex;
    }

    .day-note {
      font-size: 12.5px;
      color: var(--ink-3);
      background: var(--surface-alt);
      border-radius: var(--radius-sm);
      padding: 10px 14px;
      line-height: 1.6;
      margin-bottom: 4px;
    }

    .problem-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 9px 14px;
      background: var(--bg);
      border: 1px solid var(--border-soft);
      border-radius: var(--radius-sm);
      transition: border-color 0.12s, background 0.12s;
    }

    .problem-row:hover {
      border-color: var(--border);
      background: #f5f4f0;
    }

    .p-idx {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      color: var(--ink-4);
      min-width: 20px;
      flex-shrink: 0;
    }

    .p-name {
      flex: 1;
      font-size: 13px;
      font-weight: 400;
      color: var(--ink-2);
    }

    .p-lc {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      color: var(--ink-4);
      flex-shrink: 0;
    }

    .diff-tag {
      font-family: 'DM Mono', monospace;
      font-size: 9.5px;
      font-weight: 500;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      padding: 3px 9px;
      border-radius: 100px;
      flex-shrink: 0;
    }

    .diff-tag.easy {
      background: var(--easy-bg);
      color: var(--easy);
    }

    .diff-tag.medium {
      background: var(--medium-bg);
      color: var(--medium);
    }

    .diff-tag.hard {
      background: var(--hard-bg);
      color: var(--hard);
    }

    .solve-link {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      color: var(--ink-4);
      text-decoration: none;
      padding: 4px 10px;
      border: 1px solid var(--border);
      border-radius: 4px;
      transition: all 0.12s;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .solve-link:hover {
      color: var(--ink);
      border-color: var(--ink-3);
    }

    /* ── REST DAY ── */
    .rest-day .day-header {
      opacity: 0.65;
    }

    .rest-content {
      padding: 20px;
      display: flex;
      gap: 14px;
      align-items: flex-start;
    }

    .rest-icon {
      font-size: 20px;
      flex-shrink: 0;
      margin-top: 1px;
    }

    .rest-text {
      font-size: 13px;
      color: var(--ink-3);
      line-height: 1.65;
    }

    .rest-text strong {
      color: var(--ink);
    }

    /* ── OVERVIEW ── */
    .overview-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-bottom: 24px;
    }

    .phase-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 24px 24px 22px;
    }

    .phase-month {
      font-family: 'DM Mono', monospace;
      font-size: 9.5px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .phase-title {
      font-family: 'Fraunces', serif;
      font-size: 19px;
      font-weight: 400;
      letter-spacing: -0.3px;
      margin-bottom: 10px;
      line-height: 1.2;
    }

    .phase-desc {
      font-size: 13px;
      color: var(--ink-3);
      line-height: 1.6;
    }

    .phase-weeks {
      display: inline-block;
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      padding: 3px 10px;
      border-radius: 100px;
      margin-bottom: 12px;
    }

    .rules-section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 28px 28px 22px;
    }

    .rules-title {
      font-family: 'Fraunces', serif;
      font-size: 18px;
      font-weight: 400;
      color: var(--ink);
      margin-bottom: 18px;
    }

    .rules-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
    }

    .rule {
      display: flex;
      gap: 12px;
      align-items: flex-start;
      padding: 14px 16px;
      background: var(--surface-alt);
      border-radius: var(--radius-sm);
    }

    .rule-ico {
      font-size: 15px;
      flex-shrink: 0;
      margin-top: 1px;
    }

    .rule-body {
      font-size: 12.5px;
      color: var(--ink-3);
      line-height: 1.6;
    }

    .rule-body strong {
      color: var(--ink);
      font-weight: 600;
    }

    .overview-header {
      margin-bottom: 28px;
    }

    .overview-eyebrow {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--ink-4);
      margin-bottom: 8px;
    }

    .overview-title {
      font-family: 'Fraunces', serif;
      font-size: 32px;
      font-weight: 400;
      letter-spacing: -0.8px;
      line-height: 1.15;
      color: var(--ink);
    }

    .overview-title em {
      font-style: italic;
      color: var(--ink-3);
    }

    .overview-sub {
      font-size: 14px;
      color: var(--ink-3);
      margin-top: 8px;
      line-height: 1.6;
      max-width: 540px;
    }

    .nav-hint {
      text-align: center;
      padding: 32px 0 8px;
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--ink-4);
    }

    /* ── DIVIDER ── */
    .section-div {
      height: 1px;
      background: var(--border);
      margin: 10px 0 18px;
    }

    /* ── SCROLLBAR ── */
    ::-webkit-scrollbar {
      width: 5px;
      height: 5px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 3px;
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 860px) {
      .layout {
        grid-template-columns: 1fr;
      }

      .sidebar {
        position: static;
        height: auto;
        border-right: none;
        border-bottom: 1px solid var(--border);
      }

      .overview-grid {
        grid-template-columns: 1fr;
      }

      .rules-grid {
        grid-template-columns: 1fr;
      }

      .main {
        padding: 20px;
      }

      .week-hero {
        padding: 22px 22px;
      }
    }

    /* Animation */
    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(8px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .animate-in {
      animation: fadeUp 0.22s ease forwards;
    }
  </style>
</head>

<body>

  <header class="header">
    <div class="header-inner">
      <div class="logo">
        <span class="logo-mark">DSA Blueprint</span>
        <span class="logo-sub">90 days · python + javascript</span>
      </div>
      <div class="header-stats">
        <div class="h-stat">
          <span class="n">90</span>
          <span class="l">Days</span>
        </div>
        <div class="h-stat">
          <span class="n">12</span>
          <span class="l">Weeks</span>
        </div>
        <div class="h-stat">
          <span class="n">~500</span>
          <span class="l">Problems</span>
        </div>
        <div class="h-stat">
          <span class="n">6</span>
          <span class="l">Mocks</span>
        </div>
      </div>
    </div>
  </header>

  <div class="layout">
    <nav class="sidebar" id="sidebar"></nav>
    <main class="main" id="main"></main>
  </div>

  <script>
    const PLAN = [
      {
        week: 1, month: 1,
        title: "Arrays & Two Pointers",
        tag: "Month 1 · Week 1",
        focus: "The foundation of everything. Master array manipulation + two-pointer pattern — these two alone solve ~25% of interview problems.",
        mentor: "Don't rush this week. <strong>Two Pointers is the most underrated pattern</strong> in DSA prep. Nail every variation here — inward, outward, fast/slow. You'll use this in trees, linked lists, and strings too. Code every solution in Python first, then optionally JS. Target: understand before you memorize.",
        days: [
          {
            num: 1, title: "Array Warm-up", note: "Start smooth — these feel easy but carry patterns you'll reuse. Focus on understanding time/space complexity of each.", problems: [
              { name: "Two Sum", lc: "1", diff: "easy" },
              { name: "Best Time to Buy and Sell Stock", lc: "121", diff: "easy" },
              { name: "Contains Duplicate", lc: "217", diff: "easy" },
              { name: "Maximum Subarray (Kadane's)", lc: "53", diff: "medium" },
              { name: "Product of Array Except Self", lc: "238", diff: "medium" },
            ]
          },
          {
            num: 2, title: "Two Pointers — Core", note: "The bread and butter. Inward two pointers (from both ends) is today's focus. Understand WHEN to move which pointer.", problems: [
              { name: "Valid Palindrome", lc: "125", diff: "easy" },
              { name: "Two Sum II (Sorted Input)", lc: "167", diff: "medium" },
              { name: "3Sum", lc: "15", diff: "medium" },
              { name: "Container With Most Water", lc: "11", diff: "medium" },
              { name: "Sort Colors (Dutch Flag)", lc: "75", diff: "medium" },
              { name: "Move Zeroes", lc: "283", diff: "easy" },
            ]
          },
          {
            num: 3, title: "Two Pointers — Hard Push", note: "Trapping Rain Water is a rite of passage. Spend 30 min on it before looking at hints. This single problem teaches you 3 different approaches.", problems: [
              { name: "Trapping Rain Water", lc: "42", diff: "hard" },
              { name: "4Sum", lc: "18", diff: "medium" },
              { name: "Remove Duplicates from Sorted Array II", lc: "80", diff: "medium" },
              { name: "Squares of a Sorted Array", lc: "977", diff: "easy" },
              { name: "Merge Sorted Array", lc: "88", diff: "easy" },
            ]
          },
          {
            num: 4, title: "Array Patterns", note: "Next Permutation looks scary but the algorithm is elegant. Rotate Array teaches the reverse-trick which appears in many places.", problems: [
              { name: "Rotate Array", lc: "189", diff: "medium" },
              { name: "Next Permutation", lc: "31", diff: "medium" },
              { name: "Find Minimum in Rotated Sorted Array", lc: "153", diff: "medium" },
              { name: "First Missing Positive", lc: "41", diff: "hard" },
              { name: "Subarray Sum Equals K", lc: "560", diff: "medium" },
              { name: "Majority Element", lc: "169", diff: "easy" },
            ]
          },
          {
            num: 5, title: "Matrix (2D Arrays)", note: "Matrix problems are just 2D array problems. Treat each row as an array. Practice rotating index math on paper before coding.", problems: [
              { name: "Spiral Matrix", lc: "54", diff: "medium" },
              { name: "Set Matrix Zeroes", lc: "73", diff: "medium" },
              { name: "Rotate Image", lc: "48", diff: "medium" },
              { name: "Search a 2D Matrix", lc: "74", diff: "medium" },
              { name: "Game of Life", lc: "289", diff: "medium" },
            ]
          },
          {
            num: 6, title: "Array Review + Hard", note: "Jump Game II — try greedy first, then DP. Longest Consecutive is the 'Goldilocks' problem: too slow with sorting, just right with hash.", problems: [
              { name: "Jump Game", lc: "55", diff: "medium" },

    let currentWeek = null;

    const MC = { 1: 'm1', 2: 'm2', 3: 'm3' };

    function buildSidebar() {
      const sb = document.getElementById('sidebar');
      const labels = ['Foundation', 'Core DS', 'Advanced'];
      let html = '';
      [1, 2, 3].forEach(m => {
        const weeks = PLAN.filter(w => w.month === m);
        const mc = MC[m];
        html += `<div class="sidebar-group sg-${mc}">
          <div class="sidebar-label">Month ${m} · ${labels[m - 1]}</div>`;
        weeks.forEach(w => {
          const active = currentWeek === w.week;
          html += `<button class="week-btn${active ? ' active' : ''}" onclick="showWeek(${w.week})">
            <span class="w-num">W${w.week}</span>
            ${w.title}
          </button>`;
        });
        html += `</div>`;
      });
      sb.innerHTML = html;
    }

    function showWeek(n) {
      currentWeek = n;
      buildSidebar();
      renderWeek();
      document.getElementById('main').scrollTop = 0;
    }

    function renderWeek() {
      const week = PLAN.find(w => w.week === currentWeek);
      if (!week) return;
      const mc = MC[week.month];
      const totalProbs = week.days.reduce((a, d) => a + (d.problems ? d.problems.length : 0), 0);

      let html = `<div class="week-hero animate-in">
        <div class="week-eyebrow" style="color:var(--${mc})">${week.tag}</div>
        <div class="week-title">Week ${week.week}: ${week.title}</div>
        <div class="week-focus">${week.focus}</div>
        <div class="week-chips">
          <span class="chip chip-${mc}">${totalProbs} problems</span>
          <span class="chip chip-${mc}">7 days</span>
          <span class="chip chip-neutral">Python → JS</span>
        </div>
        <div class="mentor-block ${mc}">
          <div class="mentor-label" style="color:var(--${mc})">Mentor Note</div>
          ${week.mentor}
        </div>
      </div>
      <div class="days-grid">`;

      week.days.forEach((day, idx) => {
        const isRest = day.rest;
        html += `<div class="day-card${isRest ? ' rest-day' : ''}" id="dc-${week.week}-${idx}">
          <div class="day-header" onclick="toggleDay(${week.week}, ${idx})">
            <div class="day-num-badge">Day ${day.num}</div>
            <div class="day-title">${day.title}</div>
            <div class="day-meta">
              ${isRest
            ? `<span style="font-family:'DM Mono',monospace;font-size:10px;color:var(--ink-4)">Rest</span>`
            : `<span class="p-count-badge">${day.problems.length}p</span>`
          }
              <div class="expand-btn">
                <svg width="12" height="12" viewBox="0 0 12 12" fill="none" xmlns="http://www.w3.org/2000/svg">
                  <path d="M2 4L6 8L10 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
              </div>
            </div>
          </div>`;

        if (isRest) {
          html += `<div class="rest-content">
            <div class="rest-icon">🌙</div>
            <div class="rest-text"><strong>Rest & Review Day</strong><br>${day.note}</div>
          </div>`;
        } else {
          html += `<div class="day-body">`;
          if (day.note) html += `<div class="day-note">${day.note}</div>`;
          day.problems.forEach((p, pi) => {
            const slug = toLCSlug(p.name);
            html += `<div class="problem-row">
              <div class="p-idx">${String(pi + 1).padStart(2, '0')}</div>
              <div class="p-name">${p.name}</div>
              <div class="p-lc">LC ${p.lc}</div>
              <div class="diff-tag ${p.diff}">${p.diff}</div>
              <a class="solve-link" href="https://leetcode.com/problems/${slug}/" target="_blank" rel="noopener noreferrer">Solve ↗</a>
            </div>`;
          });
          html += `</div>`;
        }
        html += `</div>`;
      });

      html += `</div>`;
      document.getElementById('main').innerHTML = html;
    }

    function renderOverview() {
      document.getElementById('main').innerHTML = `
        <div class="overview-header animate-in">
          <div class="overview-eyebrow">Your personal prep plan</div>
          <div class="overview-title">90-Day DSA Blueprint<br><em>for the serious candidate</em></div>
          <div class="overview-sub">A structured, mentor-guided journey from array fundamentals to dynamic programming and graphs — built to get you ready for FAANG and top-tier engineering interviews.</div>
        </div>

        <div class="overview-grid">
          <div class="phase-card">
            <div class="phase-month" style="color:var(--m1)">Month 1</div>
            <div class="phase-weeks" style="background:var(--m1-bg);color:var(--m1)">Weeks 1–4</div>
            <div class="phase-title">Foundation</div>
            <div class="phase-desc">Arrays, Two Pointers, Sliding Window, Hashing, Prefix Sum, Binary Search, Sorting, Intervals, and Stacks. The patterns that solve 40% of all interview problems.</div>
          </div>
          <div class="phase-card">
            <div class="phase-month" style="color:var(--m2)">Month 2</div>
            <div class="phase-weeks" style="background:var(--m2-bg);color:var(--m2)">Weeks 5–8</div>
            <div class="phase-title">Core Data Structures</div>
            <div class="phase-desc">Linked Lists, Stacks & Queues with BFS patterns, Binary Trees (DFS & BFS), BST, Heaps/Priority Queues, and Tries. The data structures FAANG loves.</div>
          </div>
          <div class="phase-card">
            <div class="phase-month" style="color:var(--m3)">Month 3</div>
            <div class="phase-weeks" style="background:var(--m3-bg);color:var(--m3)">Weeks 9–12</div>
            <div class="phase-title">Advanced Techniques</div>
            <div class="phase-desc">Dynamic Programming (1D, 2D, interval, state machine), Graphs (BFS/DFS, Dijkstra, Union Find), Backtracking, and intensive mock interview sessions.</div>
          </div>
        </div>

        <div class="rules-section">
          <div class="rules-title">How to use this plan</div>
          <div class="rules-grid">
            <div class="rule">
              <div class="rule-ico">⏱</div>
              <div class="rule-body"><strong>25-min rule</strong> — Spend 25 min trying independently. After that, look at a hint (not the solution). After 10 more, read the approach — not the code.</div>
            </div>
            <div class="rule">
              <div class="rule-ico">✍️</div>
              <div class="rule-body"><strong>Write it out</strong> — For every hard problem, write the recurrence or approach in plain English before coding. This is the skill interviewers actually test.</div>
            </div>
            <div class="rule">
              <div class="rule-ico">🔄</div>
              <div class="rule-body"><strong>Re-solve on Day 7</strong> — Every rest day, pick 3 problems from the week you solved with hints and re-solve them cold. This is spaced repetition.</div>
            </div>
            <div class="rule">
              <div class="rule-ico">🐍</div>
              <div class="rule-body"><strong>Python main, JS bonus</strong> — Code every solution in Python first. Optionally rewrite stack/queue/tree solutions in JavaScript once you've passed in Python.</div>
            </div>
            <div class="rule">
              <div class="rule-ico">💬</div>
              <div class="rule-body"><strong>Talk out loud</strong> — Narrate your approach while solving. "I'm using a sliding window because the array is contiguous…" This is interview muscle memory.</div>
            </div>
            <div class="rule">
              <div class="rule-ico">🎯</div>
              <div class="rule-body"><strong>Pattern over problem</strong> — Don't memorize solutions. Learn the PATTERN behind each problem. One pattern unlocks dozens of similar problems.</div>
            </div>
          </div>
        </div>

        <div class="nav-hint">← Select a week from the sidebar to begin</div>
      `;
    }

    function toggleDay(week, idx) {
      const card = document.getElementById(`dc-${week}-${idx}`);
      if (card) card.classList.toggle('open');
    }

    function toLCSlug(name) {
      return name.toLowerCase()
        .replace(/&/g, ' and ')
        .replace(/\//g, ' and ')
        .replace(/\+/g, ' plus ')
        .replace(/[^a-z0-9\s-]/g, '')
        .trim()
        .replace(/\s+/g, '-')
        .replace(/-+/g, '-');
    }

    buildSidebar();
    renderOverview();
  </script>
</body>

</html>
